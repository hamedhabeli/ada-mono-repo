name: Build Desktop Applications

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    name: Build Desktop app (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            os: windows-latest
            target: 'x86_64-pc-windows-msvc'
          - platform: 'macos-latest'
            os: macos-latest
            target: 'apple-darwin' # we'll resolve dynamic arch naming (x86_64 or aarch64) in the runner
          - platform: 'ubuntu-latest'
            os: ubuntu-latest
            target: 'x86_64-unknown-linux-gnu'

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # 1. Setup Node.js
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: ./frontend/package.json

      # 2. Setup Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: ./backend/requirements.txt

      # 3. Setup Rust
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./frontend/src-tauri -> target

      # 4. Install Ubuntu System Dependencies (Required for Tauri on Linux)
      - name: Install Ubuntu Webkit/GTK dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      # 5. Build Python Sidecar Backend with PyInstaller
      - name: Install Python Dependencies & PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller==6.5.0 Pillow

      - name: Compile Backend Single-File Binary
        working-directory: ./backend
        run: |
          pyinstaller ada-api.spec

      # 6. Place Python Sidecar with correct target-triple naming inside Tauri folder
      - name: Place Sidecar on Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          mkdir -p frontend/src-tauri/binaries
          move backend/dist/ada-api.exe frontend/src-tauri/binaries/ada-api-${{ matrix.target }}.exe

      - name: Place Sidecar on macOS
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          mkdir -p frontend/src-tauri/binaries
          ARCH=$(uname -m)
          if [ "$ARCH" = "arm64" ]; then
            mv backend/dist/ada-api frontend/src-tauri/binaries/ada-api-aarch64-apple-darwin
          else
            mv backend/dist/ada-api frontend/src-tauri/binaries/ada-api-x86_64-apple-darwin
          fi

      - name: Place Sidecar on Linux
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          mkdir -p frontend/src-tauri/binaries
          mv backend/dist/ada-api frontend/src-tauri/binaries/ada-api-${{ matrix.target }}

      # 7. Generate Theme-Aligned Icons (to ensure Tauri build doesn't fail on missing icons)
      - name: Generate Icon Assets
        run: |
          python generate_placeholder_icons.py

      # 8. Install Node Dependencies & Compile Frontend Build
      - name: Build React Frontend
        working-directory: ./frontend
        run: |
          npm install
          npm run build

      # 9. Build Tauri Desktop Application Bundle
      - name: Build Tauri Desktop Package
        working-directory: ./frontend
        run: |
          npm run tauri build

      # 10. Upload Platform Installers
      - name: Upload Windows Installers
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ada-desktop-windows
          path: |
            frontend/src-tauri/target/release/bundle/msi/*.msi
            frontend/src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload macOS Installers
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ada-desktop-macos
          path: |
            frontend/src-tauri/target/release/bundle/dmg/*.dmg
            frontend/src-tauri/target/release/bundle/macos/*.app

      - name: Upload Linux Installers
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ada-desktop-linux
          path: |
            frontend/src-tauri/target/release/bundle/deb/*.deb
            frontend/src-tauri/target/release/bundle/appimage/*.AppImage
